<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magia de Emojis ✨ - Un Regalo para Peques</title>
    <meta name="description" content="Una aplicación interactiva para niños con estrellas mágicas y emojis de comida. ¡Pulsa cualquier tecla y descubre la magia!">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="starfield"></canvas>
    
    <div id="overlay">
        <div id="welcome-card">
            <h1>✨ ¡Magia de Emojis! ✨</h1>
            <p>Mueve el ratón para asustar a las estrellas y pulsa cualquier tecla para ver comida deliciosa.</p>
            <button id="start-btn">¡Empezar Fiesta! 🎉</button>
        </div>
        <div id="fullscreen-tip">Pulsa F11 para pantalla completa</div>
    </div>

    <div id="emoji-container"></div>

    <script src="script.js"></script>
</body>
</html>
